<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo - Paula</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .greeting {
            text-align: center;
            margin-bottom: 40px;
        }
        .form-section {
            margin-bottom: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f2f2f2;
            font-weight: bold;
        }
        tr:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="greeting">
            <h1>Hola Mundo</h1>
            <p>Soy Paula</p>
        </div>
        <div class="form-section">
            <h2>Agregar Compañeros</h2>
            <form id="companerosForm">
                <div class="form-group">
                    <label for="comp1">Nombre del Compañero 1:</label>
                    <input type="text" id="comp1" required>
                </div>
                <div class="form-group">
                    <label for="comp2">Nombre del Compañero 2:</label>
                    <input type="text" id="comp2" required>
                </div>
                <button type="submit">Agregar a la Tabla</button>
            </form>
        </div>
        <div class="table-section">
            <h2>Lista de Compañeros</h2>
            <table id="companerosTable">
                <thead>
                    <tr>
                        <th>Compañero</th>
                        <th>Nombre</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows will be added here -->
                </tbody>
            </table>
        </div>
    </div>
    <script>
        document.getElementById('companerosForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const comp1 = document.getElementById('comp1').value;
            const comp2 = document.getElementById('comp2').value;
            const tableBody = document.querySelector('#companerosTable tbody');
            
            // Clear existing rows
            tableBody.innerHTML = '';
            
            // Add rows
            const row1 = tableBody.insertRow();
            row1.insertCell(0).textContent = 'Compañero 1';
            row1.insertCell(1).textContent = comp1;
            
            const row2 = tableBody.insertRow();
            row2.insertCell(0).textContent = 'Compañero 2';
            row2.insertCell(1).textContent = comp2;
            
            // Clear form
            document.getElementById('comp1').value = '';
            document.getElementById('comp2').value = '';
        });
    </script>
</body>
</html>
